openapi: 3.0.3
info:
  title: Speedpay API
  version: 1.0.0
  description: Speedpay Application API with JWT Authentication and User Management
paths:
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      summary: Change Password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Password updated successfully.
        '400':
          description: Wrong old password.
  /api/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      summary: Forgot Password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Reset link sent if account exists.
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: |-
        Retrieve details of the currently authenticated user.
        Requires a valid JWT token in the Authorization header (e.g. 'Bearer <token>').
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        Register a new user in the Speedpay application.
        Automatically generates and returns JWT access and refresh tokens upon successful registration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegister'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegister'
          description: ''
  /api/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      summary: Reset Password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Password reset successfully.
        '400':
          description: Invalid or expired token.
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/payment/balance/:
    get:
      operationId: payment_balance_retrieve
      tags:
      - payment
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'
          description: ''
  /api/payment/deposit/:
    post:
      operationId: payment_deposit_create
      summary: Deposit Funds
      tags:
      - payment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Deposit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Deposit'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Deposit'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Deposit successful
  /api/payment/transactions/:
    get:
      operationId: payment_transactions_list
      description: |-
        Returns transaction history.
        - Admin users see ALL transactions across all accounts.
        - Customer users only see their own account's transactions.

        Supports filtering via query params:
        - `transaction_type` (deposit | withdrawal | transfer_sent | transfer_received)
        - `date_from` (ISO 8601 datetime, e.g. 2025-01-01T00:00:00)
        - `date_to` (ISO 8601 datetime)
      summary: Get Transaction History
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date-time
        description: Filter from this datetime (ISO 8601)
      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
        description: Filter up to this datetime (ISO 8601)
      - in: query
        name: transaction_type
        schema:
          type: string
        description: 'Filter by type: deposit, withdrawal, transfer_sent, transfer_received'
      tags:
      - payment
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ledger'
          description: ''
  /api/payment/transfer/:
    post:
      operationId: payment_transfer_create
      summary: Transfer Funds
      tags:
      - payment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transfer'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Transfer'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Transfer'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Transfer successful
        '400':
          description: Invalid request or insufficient funds
  /api/payment/withdraw/:
    post:
      operationId: payment_withdraw_create
      summary: Withdraw Funds
      tags:
      - payment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Withdrawal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Withdrawal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Withdrawal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Withdrawal successful
        '400':
          description: Insufficient funds
  /api/users/:
    get:
      operationId: users_list
      description: Retrieves a list of all registered users. Only accessible by admins.
      summary: List All Users (Admin Only)
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDetail'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
components:
  schemas:
    AccountBalance:
      type: object
      properties:
        account_number:
          type: string
          readOnly: true
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - account_number
      - balance
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Deposit:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - amount
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Ledger:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        transaction_type:
          allOf:
          - $ref: '#/components/schemas/TransactionTypeEnum'
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        balance_after:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        description:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - balance_after
      - created_at
      - description
      - id
      - transaction_type
    ResetPassword:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - token
      - uid
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TransactionTypeEnum:
      enum:
      - deposit
      - withdrawal
      - transfer_sent
      - transfer_received
      type: string
      description: |-
        * `deposit` - Deposit
        * `withdrawal` - Withdrawal
        * `transfer_sent` - Transfer Sent
        * `transfer_received` - Transfer Received
    Transfer:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        destination_account:
          type: string
          maxLength: 6
      required:
      - amount
      - destination_account
    UserDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - email
      - id
    UserRegister:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
        first_name:
          type: string
          default: ''
        last_name:
          type: string
          default: ''
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
      required:
      - email
      - id
      - password
    UserTypeEnum:
      enum:
      - admin
      - customer
      type: string
      description: |-
        * `admin` - Admin
        * `customer` - Customer
    Withdrawal:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - amount
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
